<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room — Unidad 6</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #2563EB;
    --blue-light: #DBEAFE;
    --blue-dark: #1E40AF;
    --green: #059669;
    --green-light: #D1FAE5;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --gold: #D97706;
    --gold-light: #FEF3C7;
    --purple: #7C3AED;
    --purple-light: #EDE9FE;
    --bg: #F0F7FF;
    --card: #FFFFFF;
    --text: #1E293B;
    --muted: #64748B;
    --border: #E2E8F0;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #1E40AF 0%, #2563EB 50%, #7C3AED 100%);
    padding: 2.5rem 1.5rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-emoji { font-size: 48px; display: block; margin-bottom: 12px; position: relative; }
  .hero h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 6px;
    position: relative;
    letter-spacing: -0.5px;
  }
  .hero p {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    position: relative;
    margin-bottom: 1.5rem;
  }

  /* PROGRESS */
  .progress-wrap {
    position: relative;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    height: 12px;
    overflow: hidden;
    max-width: 400px;
    margin: 0 auto 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #34D399, #10B981);
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-label {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    position: relative;
  }

  /* MAIN */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* ROOM CARD */
  .room-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .room-card.done { border-color: #10B981; }
  .room-card.locked { opacity: 0.55; }

  .room-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }
  .room-card.locked .room-header { cursor: not-allowed; }

  .room-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .room-info { flex: 1; min-width: 0; }
  .room-name {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 2px;
  }
  .room-desc { font-size: 13px; color: var(--muted); }

  .badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-open { background: var(--blue-light); color: var(--blue-dark); }
  .badge-done { background: var(--green-light); color: var(--green); }
  .badge-locked { background: var(--border); color: var(--muted); }

  /* CHALLENGE BODY */
  .challenge-body {
    padding: 0 18px 18px;
    border-top: 2px solid var(--border);
    display: none;
  }
  .challenge-body.open { display: block; }

  .q-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 16px 0 10px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    padding: 11px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Nunito Sans', sans-serif;
    cursor: pointer;
    color: var(--text);
    background: #fff;
    text-align: left;
    font-weight: 600;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.4;
  }
  .opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); }
  .opt.correct { background: var(--green-light); border-color: var(--green); color: #065F46; }
  .opt.wrong { background: var(--red-light); border-color: var(--red); color: #991B1B; }

  /* FILL */
  .fill-wrap { display: flex; flex-direction: column; gap: 8px; }
  .fill-input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: 'Nunito Sans', sans-serif;
    font-weight: 600;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }
  .fill-input:focus { border-color: var(--blue); }
  .btn-check {
    align-self: flex-start;
    padding: 9px 20px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-check:hover { background: var(--blue-dark); }

  /* FEEDBACK */
  .feedback {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .fb-ok { background: var(--green-light); color: #065F46; }
  .fb-err { background: var(--red-light); color: #991B1B; }

  /* NEXT BTN */
  .btn-next {
    margin-top: 14px;
    padding: 10px 22px;
    background: #fff;
    color: var(--blue);
    border: 2px solid var(--blue);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .btn-next:hover { background: var(--blue-light); }

  /* CODE REVEAL */
  .code-reveal {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--radius-sm);
    background: var(--green-light);
    border: 2px solid #10B981;
    text-align: center;
    display: none;
  }
  .code-reveal.show { display: block; }
  .code-emoji { font-size: 28px; margin-bottom: 6px; }
  .code-label { font-size: 12px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .code-word {
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: #065F46;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .code-hint { font-size: 12px; color: var(--green); font-weight: 600; }

  /* FINAL */
  .final-panel {
    background: linear-gradient(135deg, #065F46 0%, #059669 100%);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
    display: none;
  }
  .final-panel.show { display: block; }
  .final-trophy { font-size: 56px; display: block; margin-bottom: 12px; }
  .final-title {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
  }
  .final-sub { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 16px; font-weight: 600; }
  .final-codes {
    background: rgba(255,255,255,0.15);
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    margin-bottom: 12px;
  }
  .final-code-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.7); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .final-code-words {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1.8;
  }
  .final-msg { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 600; }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">🔐</span>
  <h1>Escape Room — Unidad 6</h1>
  <p>Completa las 8 salas para descubrir el código final</p>
  <div class="progress-wrap">
    <div class="progress-fill" id="pbar"></div>
  </div>
  <div class="progress-label" id="plabel">0 de 8 salas completadas</div>
</div>

<div class="main">
  <div id="rooms-list"></div>

  <div class="final-panel" id="final-panel">
    <span class="final-trophy">🏆</span>
    <div class="final-title">¡Escapaste! ¡Eres increíble!</div>
    <div class="final-sub">Completaste todas las salas de la Unidad 6.</div>
    <div class="final-codes">
      <div class="final-code-label">Tu código final</div>
      <div class="final-code-words" id="final-words"></div>
    </div>
    <div class="final-msg">Muéstraselo a tu maestra para recibir tu recompensa.</div>
  </div>
</div>

<script>
const TOTAL = 8;
const ROOMS = [
  {
    id:0, icon:"📚", bg:"#DBEAFE",

    code:"LIBRE",
    questions:[
      {type:"mc",q:"¿Cuál es el mejor comienzo para una conclusión de un ensayo?",
       opts:["'Primero, Katarina...'","'En conclusión, estos textos nos enseñan que...'","'Yo creo que...' sin ningún apoyo del texto","'El texto dice...' al final sin cerrar la idea"],ans:1,
       fb_ok:"¡Correcto! Una conclusión fuerte retoma la idea central con conectores como 'en conclusión'.",
       fb_err:"Una conclusión debe cerrar el argumento, no empezar uno nuevo."},
      {type:"mc",q:"¿Qué tipo de pregunta te pide usar el texto Y tu propia opinión o experiencia?",
       opts:["Right There","Think and Search","Author and Me"],ans:2,
       fb_ok:"¡Exacto! Author and Me combina evidencia del texto con tu propio pensamiento.",
       fb_err:"Revisa el marco QAR que hemos practicado en clase."},
      {type:"mc",q:"Kendra, Katarina y Amelia tomaron decisiones importantes. ¿Qué pregunta QAR te pide reflexionar sobre las consecuencias usando TUS ideas?",
       opts:["Right There: la respuesta está escrita en el texto","Think and Search: busco en varias partes del texto","Author and Me: uso el texto y reflexiono con mis propias ideas"],ans:2,
       fb_ok:"¡Muy bien! Cuando reflexionas sobre consecuencias y usas tus propias ideas, es Author and Me.",
       fb_err:"¿Puedes encontrar la respuesta directamente en el texto, o necesitas pensar tú también?"}
    ]
  }
];

let state = ROOMS.map((_,i) => ({open: i===0, done: false, qi: 0, score: 0}));
let codes = [];

function updateProgress() {
  const done = state.filter(s=>s.done).length;
  document.getElementById('pbar').style.width = (done/TOTAL*100)+'%';
  document.getElementById('plabel').textContent = done+' de '+TOTAL+' salas completadas';
  if (done === TOTAL) {
    document.getElementById('final-words').textContent = codes.join('  ·  ');
    document.getElementById('final-panel').classList.add('show');
    document.getElementById('final-panel').scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function render() {
  const list = document.getElementById('rooms-list');
  list.innerHTML = '';
  ROOMS.forEach((room, i) => {
    const st = state[i];
    const div = document.createElement('div');
    div.className = 'room-card' + (st.done?' done':!st.open?' locked':'');
    div.innerHTML = `
      <div class="room-header" onclick="toggle(${i})">
        <div class="room-icon" style="background:${room.bg}">${room.icon}</div>
        <div class="room-info">
          <div class="room-name">${room.name}</div>
          <div class="room-desc">${room.desc}</div>
        </div>
        <span class="badge ${st.done?'badge-done':st.open?'badge-open':'badge-locked'}">
          ${st.done?'✓ Completada':st.open?'Abierta':'🔒 Bloqueada'}
        </span>
      </div>
      <div class="challenge-body ${st.open&&!st.done?'open':''}" id="cb-${i}"></div>`;
    list.appendChild(div);
    if (st.open && !st.done) renderQ(i);
  });
  updateProgress();
}

function toggle(i) {
  if (!state[i].open || state[i].done) return;
  const cb = document.getElementById('cb-'+i);
  cb.classList.toggle('open');
  if (cb.classList.contains('open') && !cb.innerHTML.trim()) renderQ(i);
}

function renderQ(i) {
  const room = ROOMS[i];
  const st = state[i];
  const cb = document.getElementById('cb-'+i);
  if (st.qi >= room.questions.length) { markDone(i); return; }
  const q = room.questions[st.qi];
  let h = `<div class="q-label">Pregunta ${st.qi+1} de ${room.questions.length}</div>`;
  h += `<div class="q-text">${q.q}</div>`;
  if (q.type === 'mc') {
    h += `<div class="options">`;
    q.opts.forEach((o,oi) => { h += `<button class="opt" id="o-${i}-${oi}" onclick="chkMC(${i},${oi})">${o}</button>`; });
    h += `</div>`;
  } else {
    h += `<div class="fill-wrap"><input type="text" class="fill-input" id="fi-${i}" placeholder="Escribe tu respuesta aquí..."><button class="btn-check" onclick="chkFill(${i})">Verificar ✓</button></div>`;
  }
  h += `<div class="feedback" id="fb-${i}"></div>`;
  h += `<button class="btn-next" id="bn-${i}" onclick="nextQ(${i})">Siguiente pregunta →</button>`;
  h += `<div class="code-reveal" id="cr-${i}"><div class="code-emoji">🔑</div><div class="code-label">¡Palabra clave desbloqueada!</div><div class="code-word" id="cw-${i}"></div><div class="code-hint">Anótala — la necesitarás al final</div></div>`;
  cb.innerHTML = h;
}

function chkMC(i, chosen) {
  const q = ROOMS[i].questions[state[i].qi];
  document.querySelectorAll(`[id^="o-${i}-"]`).forEach(o => o.disabled = true);
  const correct = chosen === q.ans;
  document.getElementById(`o-${i}-${chosen}`).classList.add(correct?'correct':'wrong');
  if (!correct) document.getElementById(`o-${i}-${q.ans}`).classList.add('correct');
  showFB(i, correct, q);
  advance(i, correct);
}

function chkFill(i) {
  const q = ROOMS[i].questions[state[i].qi];
  const val = (document.getElementById('fi-'+i).value||'').trim().toLowerCase();
  const correct = q.ans.some(a => val.includes(a.toLowerCase()));
  document.getElementById('fi-'+i).disabled = true;
  document.querySelector(`#cb-${i} .btn-check`).disabled = true;
  showFB(i, correct, q);
  advance(i, correct);
}

function showFB(i, correct, q) {
  const fb = document.getElementById('fb-'+i);
  fb.className = 'feedback show ' + (correct?'fb-ok':'fb-err');
  fb.textContent = correct ? q.fb_ok : q.fb_err;
}

function advance(i, correct) {
  if (correct) state[i].score++;
  state[i].qi++;
  const bn = document.getElementById('bn-'+i);
  if (state[i].qi >= ROOMS[i].questions.length) {
    setTimeout(() => revealCode(i), 1300);
  } else {
    bn.style.display = 'inline-block';
    bn.textContent = correct ? 'Siguiente pregunta →' : 'Continuar →';
  }
}

function nextQ(i) {
  document.getElementById('bn-'+i).style.display = 'none';
  renderQ(i);
}

function revealCode(i) {
  const code = ROOMS[i].code;
  const bn = document.getElementById('bn-'+i);
  if (bn) bn.style.display = 'none';
  document.getElementById('cw-'+i).textContent = code;
  document.getElementById('cr-'+i).classList.add('show');
  if (!codes.includes(code)) codes.push(code);
  setTimeout(() => markDone(i), 2200);
}

function markDone(i) {
  state[i].done = true;
  if (i+1 < ROOMS.length) state[i+1].open = true;
  render();
  if (i+1 < ROOMS.length) {
    setTimeout(() => {
      const next = document.querySelectorAll('.room-card')[i+1];
      if (next) next.scrollIntoView({behavior:'smooth', block:'start'});
    }, 300);
  }
}

render();
</script>
</body>
</html>
